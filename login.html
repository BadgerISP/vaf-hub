<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | VTOL VR | VAF Community Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<style>
/* --------------------------------------- */
/* 🛠️ GLOBAL CSS VARIABLES & RESETS */
/* --------------------------------------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
    /* Palette based on VAF Logo: Blue/Gray Accents */
    --g:#3a5fff; /* Primary Accent Color (Bright Blue) */
    --gd:rgba(58, 95, 255, 0.1); /* Light Blue Overlay */
    --gb:rgba(58, 95, 255, 0.18); /* Border Blue */
    --dark:#040d1a; /* Very Dark Background (Near Black/Deep Navy) */
    --mid:#0d1c31; /* Mid-Section Background (Darker Slate Blue) */
    --panel:#102545; /* Panel/Card Background (Slightly lighter dark blue) */
    --tp:rgba(200, 220, 255, 1); /* Text Primary Color (Off-white/Light Gray) */
    --ts:rgba(173, 198, 255, 0.55); /* Text Secondary Color (Lighter blue for accents) */
    --td:rgba(173, 198, 255, 0.25); /* Text Dim/Disabled Color */
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--tp);font-family:'Rajdhani',sans-serif;overflow-x:hidden;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}

/* --------------------------------------- */
/* 🚢 NAVIGATION & LAYOUT */
/* --------------------------------------- */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:58px;background:rgba(4,13,26,0.92);border-bottom:1px solid var(--gb);backdrop-filter:blur(12px)}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1rem;letter-spacing:.18em;color:var(--g);text-decoration:none}
.logo span{color:var(--ts);font-weight:400}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ts);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--g)}
.nav-spacer{flex:1}
.btn-back{font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid var(--gb);color:var(--g);padding:7px 20px;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-back:hover{background:var(--gd);box-shadow:0 0 16px rgba(58,95,255,.2)}

/* --------------------------------------- */
/* ⭐ LOGIN SECTION */
/* --------------------------------------- */
.login-container{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 2rem 4rem;overflow:hidden}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(58,95,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(58,95,255,.04) 1px,transparent 1px);background-size:55px 55px;animation:gm 50s linear infinite}
@keyframes gm{to{background-position:55px 55px}}
.glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(58,95,255,.05) 0%,transparent 70%);animation:br 7s ease-in-out infinite;top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes br{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.1);opacity:.8}}

.login-content{position:relative;z-index:2;width:100%;max-width:420px}
.login-header{text-align:center;margin-bottom:3rem}
.login-tag{font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.25em;color:var(--g);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:14px}
.login-tag::before,.login-tag::after{content:'';display:block;width:30px;height:1px;background:rgba(58,95,255,.4)}
.login-title{font-family:'Orbitron',monospace;font-weight:900;font-size:2.2rem;line-height:1;letter-spacing:.04em;color:#fff;margin-bottom:.5rem}
.login-subtitle{font-size:.95rem;font-weight:300;letter-spacing:.1em;color:var(--ts);margin-bottom:1rem}

/* Login Form */
.login-form{background:var(--panel);border:1px solid var(--gb);padding:2.5rem;position:relative}
.form-group{margin-bottom:1.5rem}
.form-group:last-of-type{margin-bottom:2rem}
label{display:block;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ts);margin-bottom:.6rem}
input[type="text"],input[type="password"],input[type="email"]{width:100%;padding:12px 16px;background:rgba(58,95,255,.05);border:1px solid var(--gb);color:var(--tp);font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:.05em;transition:all .2s;outline:none}
input[type="text"]::placeholder,input[type="password"]::placeholder,input[type="email"]::placeholder{color:var(--td)}
input[type="text"]:focus,input[type="password"]:focus,input[type="email"]:focus{background:rgba(58,95,255,.08);border-color:var(--g);box-shadow:0 0 12px rgba(58,95,255,.1)}

/* Checkbox */
.form-group.checkbox{display:flex;align-items:center;margin-bottom:1.5rem}
.form-group.checkbox input{width:18px;height:18px;margin-right:10px;cursor:pointer;accent-color:var(--g)}
.form-group.checkbox label{margin:0;text-transform:none;font-size:.9rem;cursor:pointer}

/* Buttons */
.btn-login-primary{width:100%;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--g);color:#040d1a;border:none;padding:14px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;margin-bottom:1rem}
.btn-login-primary:hover{background:#6aa3ff;box-shadow:0 0 30px rgba(58,95,255,.4);transform:translateY(-2px)}

.form-footer{display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.form-footer a{color:var(--g);text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.1em;transition:color .2s}
.form-footer a:hover{color:#6aa3ff}

/* Registration Link */
.auth-toggle{text-align:center;margin-top:2rem;font-size:.9rem;color:var(--ts)}
.auth-toggle a{color:var(--g);text-decoration:none;font-weight:600;transition:color .2s}
.auth-toggle a:hover{color:#6aa3ff}

/* Error Message */
.error-msg{background:rgba(204,85,85,.1);border:1px solid rgba(204,85,85,.3);color:#ff9999;padding:1rem;margin-bottom:1.5rem;font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.05em;display:none}
.error-msg.show{display:block}

/* Success Message */
.success-msg{background:rgba(58,95,255,.1);border:1px solid var(--gb);color:var(--g);padding:1rem;margin-bottom:1.5rem;font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.05em;display:none}
.success-msg.show{display:block}

/* Loading Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(58,95,255,.2);border-top:2px solid var(--g);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sync Status Indicator */
.sync-status{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--gb);padding:12px 16px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:.7rem;display:flex;align-items:center;gap:8px;color:var(--ts);z-index:500}
.sync-status.syncing{color:var(--g)}
.sync-status.success{color:#6aa3ff;border-color:rgba(106,153,255,.4)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--ts)}
.sync-dot.active{background:var(--g);animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Configuration Panel (for admins) */
.config-panel{position:fixed;top:70px;right:20px;background:var(--panel);border:1px solid var(--gb);padding:1rem;border-radius:4px;width:320px;max-height:600px;overflow-y:auto;z-index:400;display:none}
.config-panel.show{display:block}
.config-title{font-family:'Orbitron',monospace;font-size:.8rem;font-weight:600;color:var(--g);margin-bottom:1rem;text-transform:uppercase}
.config-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--ts);font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem;cursor:pointer;transition:all .2s}
.config-tab.active{border-bottom-color:var(--g);color:var(--g)}
.config-tab:hover{color:var(--g)}
.config-tab-content{display:none}
.config-tab-content.active{display:block}
.config-item{margin-bottom:.8rem}
.config-item label{display:block;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--ts);margin-bottom:.3rem;text-transform:uppercase}
.config-item input,.config-item textarea{width:100%;padding:8px;background:rgba(58,95,255,.05);border:1px solid var(--gb);color:var(--tp);font-family:monospace;font-size:.75rem;outline:none}
.config-item input:focus,.config-item textarea:focus{border-color:var(--g);background:rgba(58,95,255,.08)}
.config-btn{background:var(--g);color:#040d1a;border:none;padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:.65rem;cursor:pointer;width:100%;margin-top:.5rem;text-transform:uppercase;transition:all .2s}
.config-btn:hover{background:#6aa3ff}

/* --------------------------------------- */
/* RESPONSIVE */
/* --------------------------------------- */
@media(max-width:768px){
    nav{padding:0 1.5rem}
    .nav-links{gap:1rem;font-size:.6rem}
    .login-container{padding:70px 1rem 2rem}
    .login-content{max-width:100%}
    .login-form{padding:2rem}
    .form-footer{flex-direction:column;gap:.5rem}
}

</style>
</head>
<body>

<!-- NAVIGATION -->
<nav>
  <a class="logo" href="/">VTOL<span>VR</span> // VAF HUB</a>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="our-mission.html">Our Mission</a></li>
    <li><a href="mission-board.html">Mission Board</a></li>
    <li><a href="media.html">Media</a></li>
    <li><a href="squadrons.html">Squadrons</a></li>
  </ul>
  <a href="/" class="btn-back">← Back to Hub</a>
  <button class="btn-back" onclick="toggleConfig()" style="margin-left:1rem;font-size:.6rem">⚙ Config</button>
</nav>

<!-- CONFIG PANEL -->
<div class="config-panel" id="configPanel">
  <div class="config-title">Admin Panel</div>
  
  <!-- Tabs -->
  <div style="display:flex;gap:.5rem;margin-bottom:1rem;border-bottom:1px solid var(--gb)">
    <button class="config-tab active" onclick="switchTab('database')">Database</button>
    <button class="config-tab" onclick="switchTab('missions')">Missions</button>
    <button class="config-tab" onclick="switchTab('media')">Media</button>
  </div>

  <!-- Database Tab -->
  <div id="tab-database" class="config-tab-content">
    <div class="config-item">
      <label>Database Endpoint URL</label>
      <input type="text" id="dbEndpoint" placeholder="https://your-site.pages.dev/database.json" value="https://m3mayer.com/database.json"/>
    </div>
    <div class="config-item">
      <label>Sync Interval (hours)</label>
      <input type="number" id="syncInterval" min="0.5" max="24" step="0.5" value="6"/>
    </div>
    <button class="config-btn" onclick="saveConfig()">Save Configuration</button>
    <button class="config-btn" onclick="syncNow()" style="margin-top:.3rem;background:#6aa3ff">Sync Now</button>
  </div>

  <!-- Missions Tab -->
  <div id="tab-missions" class="config-tab-content" style="display:none">
    <div class="config-item">
      <label>Mission Name</label>
      <input type="text" id="missionName" placeholder="Operation AURORA"/>
    </div>
    <div class="config-item">
      <label>Scheduled Date/Time (UTC)</label>
      <input type="text" id="missionDate" placeholder="2026-04-28 19:00 UTC"/>
    </div>
    <div class="config-item">
      <label>Briefing</label>
      <textarea id="missionBriefing" placeholder="Operation briefing..." style="width:100%;min-height:80px;padding:8px;background:rgba(58,95,255,.05);border:1px solid var(--gb);color:var(--tp);font-family:monospace;font-size:.75rem"></textarea>
    </div>
    <button class="config-btn" onclick="saveMission()">Update Mission</button>
  </div>

  <!-- Media Tab -->
  <div id="tab-media" class="config-tab-content" style="display:none">
    <div class="config-item">
      <label>Media Title</label>
      <input type="text" id="mediaTitle" placeholder="Carrier Landing"/>
    </div>
    <div class="config-item">
      <label>Description</label>
      <textarea id="mediaDescription" placeholder="Media description..." style="width:100%;min-height:60px;padding:8px;background:rgba(58,95,255,.05);border:1px solid var(--gb);color:var(--tp);font-family:monospace;font-size:.75rem"></textarea>
    </div>
    <div class="config-item">
      <label>Author/Pilot</label>
      <input type="text" id="mediaAuthor" placeholder="Pilot Callsign"/>
    </div>
    <div class="config-item">
      <label>Date Posted</label>
      <input type="text" id="mediaDate" placeholder="2 days ago"/>
    </div>
    <button class="config-btn" onclick="addMediaEntry()">Add Media</button>
  </div>

  <button class="config-btn" onclick="toggleConfig()" style="margin-top:1rem;background:#cc5555;width:100%">Close Panel</button>
</div>

<!-- SYNC STATUS -->
<div class="sync-status" id="syncStatus">
  <div class="sync-dot"></div>
  <span>Ready</span>
</div>

<!-- LOGIN SECTION -->
<section class="login-container">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  
  <div class="login-content">
    <div class="login-header">
      <div class="login-tag">Secure Access</div>
      <h1 class="login-title">Pilot Portal</h1>
      <p class="login-subtitle">Enter your credentials to access the VAF Community Hub</p>
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <div class="form-group">
        <label for="username">Pilot Callsign / Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your callsign" required/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required/>
      </div>

      <div class="form-group checkbox">
        <input type="checkbox" id="remember" name="remember"/>
        <label for="remember">Remember this device</label>
      </div>

      <button type="submit" class="btn-login-primary">Login / Access</button>

      <div class="form-footer">
        <a href="#">Forgot password?</a>
        <a href="#">Need help?</a>
      </div>
    </form>

    <div class="auth-toggle">
      Don't have an account? <a href="#" onclick="toggleRegistration(event)">Request Access</a>
    </div>
  </div>
</section>

<script>
// ============================================
// SECURE LOGIN DATABASE SYSTEM
// Cloudflare Pages Compatible Backend
// ============================================

const CONFIG_KEY = 'vaf_login_config';
const SYNC_LOG_KEY = 'vaf_sync_log';
const USER_SESSION_KEY = 'vaf_user_session';

// Initialize application on page load
document.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  initializeSyncScheduler();
  restoreSession();
  updateSyncStatus('Ready', false);
});

// ============================================
// CONFIGURATION MANAGEMENT
// ============================================
function loadConfig() {
  const stored = localStorage.getItem(CONFIG_KEY);
  if (stored) {
    const config = JSON.parse(stored);
    document.getElementById('dbEndpoint').value = config.dbEndpoint || '';
    document.getElementById('syncInterval').value = config.syncInterval || 6;
  }
}

function saveConfig() {
  const endpoint = document.getElementById('dbEndpoint').value.trim();
  const interval = parseFloat(document.getElementById('syncInterval').value);
  
  if (!endpoint || !endpoint.startsWith('http')) {
    showError('Config', 'Invalid endpoint URL');
    return;
  }
  
  if (interval < 0.5 || interval > 24) {
    showError('Config', 'Sync interval must be between 0.5 and 24 hours');
    return;
  }
  
  const config = { dbEndpoint: endpoint, syncInterval: interval };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  
  // Restart sync scheduler with new interval
  initializeSyncScheduler();
  
  showSuccess('Config', '✓ Configuration saved');
}

function getConfig() {
  const stored = localStorage.getItem(CONFIG_KEY);
  return stored ? JSON.parse(stored) : { dbEndpoint: '', syncInterval: 6 };
}

function toggleConfig() {
  const panel = document.getElementById('configPanel');
  panel.classList.toggle('show');
}

function switchTab(tabName) {
  // Hide all tab contents
  const tabs = document.querySelectorAll('.config-tab-content');
  tabs.forEach(tab => tab.classList.remove('active'));
  
  // Remove active class from all buttons
  const buttons = document.querySelectorAll('.config-tab');
  buttons.forEach(btn => btn.classList.remove('active'));
  
  // Show selected tab
  document.getElementById('tab-' + tabName).classList.add('active');
  event.target.classList.add('active');
}

// ============================================
// MISSION MANAGEMENT
// ============================================
function saveMission() {
  const name = document.getElementById('missionName').value.trim();
  const date = document.getElementById('missionDate').value.trim();
  const briefing = document.getElementById('missionBriefing').value.trim();
  
  if (!name || !date || !briefing) {
    showError('Config', 'All mission fields are required');
    return;
  }
  
  // Save to localStorage for mission-board.html to fetch
  const missionData = { name, date, briefing };
  localStorage.setItem('vaf_mission_config', JSON.stringify(missionData));
  
  showSuccess('Config', '✓ Mission updated successfully');
  
  // Clear fields
  document.getElementById('missionName').value = '';
  document.getElementById('missionDate').value = '';
  document.getElementById('missionBriefing').value = '';
}

// ============================================
// MEDIA MANAGEMENT
// ============================================
function addMediaEntry() {
  const title = document.getElementById('mediaTitle').value.trim();
  const description = document.getElementById('mediaDescription').value.trim();
  const author = document.getElementById('mediaAuthor').value.trim();
  const date = document.getElementById('mediaDate').value.trim();
  
  if (!title || !description || !author || !date) {
    showError('Config', 'All media fields are required');
    return;
  }
  
  // Get existing media list
  let mediaList = [];
  const stored = localStorage.getItem('vaf_media_config');
  if (stored) {
    try {
      mediaList = JSON.parse(stored);
    } catch (e) {
      console.warn('Media list parse error:', e);
      mediaList = [];
    }
  }
  
  // Add new media entry
  const newMedia = {
    id: Date.now(),
    title,
    description,
    author,
    date,
    icon: '📸'
  };
  
  mediaList.unshift(newMedia);
  localStorage.setItem('vaf_media_config', JSON.stringify(mediaList));
  localStorage.setItem('vaf_media_config_lastSync', Date.now());
  
  showSuccess('Config', '✓ Media entry added successfully');
  
  // Clear fields
  document.getElementById('mediaTitle').value = '';
  document.getElementById('mediaDescription').value = '';
  document.getElementById('mediaAuthor').value = '';
  document.getElementById('mediaDate').value = '';
}

// ============================================
// PASSWORD HASHING & SECURITY
// ============================================
function hashPassword(password, username) {
  // Combine username + password for salt to prevent rainbow tables
  const saltedPass = username + ':' + password + ':VAF_VAULT_SALT_2026';
  return CryptoJS.SHA256(saltedPass).toString();
}

function verifyPassword(password, username, hash) {
  return hashPassword(password, username) === hash;
}

// ============================================
// DATABASE OPERATIONS
// ============================================
async function submitLoginToDatabase(username, passwordHash, remember) {
  const config = getConfig();
  
  if (!config.dbEndpoint) {
    showError('Submit', 'Database endpoint not configured');
    return false;
  }
  
  updateSyncStatus('Submitting', true);
  
  try {
    const loginRecord = {
      username: username,
      passwordHash: passwordHash,
      timestamp: new Date().toISOString(),
      deviceRemembered: remember,
      lastUpdate: new Date().toISOString()
    };
    
    // Fetch existing database
    const response = await fetch(config.dbEndpoint, { 
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok && response.status !== 404) {
      throw new Error('Failed to fetch database: ' + response.statusText);
    }
    
    let database = [];
    if (response.ok) {
      try {
        const data = await response.json();
        database = Array.isArray(data) ? data : (data.users || []);
      } catch (e) {
        console.warn('Database parse error, starting fresh:', e);
        database = [];
      }
    }
    
    // Check if user already exists
    const existingIndex = database.findIndex(u => u.username === username);
    if (existingIndex >= 0) {
      database[existingIndex] = loginRecord;
    } else {
      database.push(loginRecord);
    }
    
    // Log sync info
    logSync('submit', username, database.length);
    
    updateSyncStatus('Submitted', false);
    return true;
    
  } catch (error) {
    console.error('Database submit error:', error);
    updateSyncStatus('Error: ' + error.message, false);
    return false;
  }
}

async function syncDatabase() {
  const config = getConfig();
  
  if (!config.dbEndpoint) {
    console.warn('Database not configured');
    return false;
  }
  
  updateSyncStatus('Syncing', true);
  
  try {
    const response = await fetch(config.dbEndpoint, { 
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok && response.status !== 404) {
      throw new Error('Sync failed: ' + response.statusText);
    }
    
    let database = [];
    if (response.ok) {
      try {
        const data = await response.json();
        database = Array.isArray(data) ? data : (data.users || []);
      } catch (e) {
        console.warn('Database parse error:', e);
      }
    }
    
    // Update local cache
    sessionStorage.setItem('vaf_db_cache', JSON.stringify(database));
    logSync('fetch', 'all', database.length);
    
    updateSyncStatus('Synced: ' + database.length + ' users', false);
    return true;
    
  } catch (error) {
    console.error('Sync error:', error);
    updateSyncStatus('Sync error', false);
    return false;
  }
}

// ============================================
// AUTO-SYNC SCHEDULER
// ============================================
let syncTimer = null;

function initializeSyncScheduler() {
  // Clear existing timer
  if (syncTimer) clearInterval(syncTimer);
  
  const config = getConfig();
  const intervalMs = config.syncInterval * 60 * 60 * 1000; // Convert hours to ms
  
  // Initial sync on load
  syncDatabase();
  
  // Scheduled sync every N hours
  syncTimer = setInterval(() => {
    console.log('Auto-sync triggered');
    syncDatabase();
  }, intervalMs);
  
  console.log('Sync scheduler initialized: every ' + config.syncInterval + ' hours');
}

async function syncNow() {
  await syncDatabase();
}

// ============================================
// SYNC STATUS & LOGGING
// ============================================
function updateSyncStatus(message, isActive) {
  const status = document.getElementById('syncStatus');
  status.querySelector('span').textContent = message;
  const dot = status.querySelector('.sync-dot');
  
  if (isActive) {
    dot.classList.add('active');
    status.classList.add('syncing');
  } else {
    dot.classList.remove('active');
    status.classList.remove('syncing');
    status.classList.add('success');
    setTimeout(() => status.classList.remove('success'), 3000);
  }
}

function logSync(action, target, count) {
  const log = {
    action: action,
    target: target,
    count: count,
    timestamp: new Date().toISOString()
  };
  
  let syncLog = JSON.parse(sessionStorage.getItem(SYNC_LOG_KEY) || '[]');
  syncLog.push(log);
  if (syncLog.length > 100) syncLog.shift(); // Keep only last 100 entries
  sessionStorage.setItem(SYNC_LOG_KEY, JSON.stringify(syncLog));
  
  console.log('[SYNC LOG]', log);
}

// ============================================
// LOGIN FORM HANDLING
// ============================================
async function handleLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  
  // Clear messages
  errorMsg.classList.remove('show');
  successMsg.classList.remove('show');
  
  // Validation
  if (!username || !password) {
    showError('errorMsg', '⚠ Callsign and password are required');
    return;
  }
  
  if (username.length < 3) {
    showError('errorMsg', '⚠ Callsign must be at least 3 characters');
    return;
  }
  
  if (password.length < 6) {
    showError('errorMsg', '⚠ Password must be at least 6 characters');
    return;
  }
  
  // Hash password using the same method
  const passwordHash = hashPassword(password, username);
  
  // Verify against database
  const verified = await verifyLoginAgainstDatabase(username, passwordHash);
  
  if (verified) {
    // Save session
    const session = {
      username: username,
      hash: passwordHash,
      timestamp: Date.now(),
      remember: remember
    };
    
    if (remember) {
      localStorage.setItem(USER_SESSION_KEY, JSON.stringify(session));
    } else {
      sessionStorage.setItem(USER_SESSION_KEY, JSON.stringify(session));
    }
    
    showSuccess('successMsg', '✓ Login successful! Admin panel unlocked.');
    
    // Hide login form and show config panel
    document.querySelector('.login-form').style.display = 'none';
    document.querySelector('.auth-toggle').style.display = 'none';
    document.getElementById('configPanel').classList.add('show');
    
    setTimeout(() => {
      document.querySelector('.login-container').style.display = 'none';
      document.body.style.overflow = 'auto';
    }, 1000);
  } else {
    showError('errorMsg', '⚠ Invalid callsign or password. Please try again.');
  }
}

// Verify login against the database
async function verifyLoginAgainstDatabase(username, passwordHash) {
  const config = getConfig();
  
  if (!config.dbEndpoint) {
    showError('errorMsg', '⚠ Database endpoint not configured');
    return false;
  }
  
  try {
    const response = await fetch(config.dbEndpoint, { 
      cache: 'no-store',
      headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok) {
      if (response.status === 404) {
        showError('errorMsg', '⚠ Database not found. Contact administrator.');
        return false;
      }
      throw new Error('Database error: ' + response.statusText);
    }
    
    const data = await response.json();
    const database = Array.isArray(data) ? data : (data.users || []);
    
    // Find user in database and verify password
    const user = database.find(u => u.username === username);
    
    if (user && user.passwordHash === passwordHash) {
      console.log('Login verified for:', username);
      return true;
    } else {
      console.log('Login failed - user not found or password mismatch');
      return false;
    }
    
  } catch (error) {
    console.error('Login verification error:', error);
    showError('errorMsg', '⚠ Connection error. Please try again.');
    return false;
  }
}

// ============================================
// SESSION MANAGEMENT
// ============================================
function restoreSession() {
  // Check localStorage first (remember me)
  let session = localStorage.getItem(USER_SESSION_KEY);
  if (!session) {
    // Check sessionStorage
    session = sessionStorage.getItem(USER_SESSION_KEY);
  }
  
  if (session) {
    try {
      const data = JSON.parse(session);
      // Could auto-login here, but for security, just show they're logged in
      console.log('Session restored for:', data.username);
      // Optionally redirect to hub
      // window.location.href = 'index2.html';
    } catch (e) {
      console.warn('Session restore error:', e);
    }
  }
}

function logout() {
  localStorage.removeItem(USER_SESSION_KEY);
  sessionStorage.removeItem(USER_SESSION_KEY);
  window.location.href = 'login.html';
}

// ============================================
// UI HELPERS
// ============================================
function showError(elementId, message) {
  const elem = document.getElementById(elementId);
  elem.textContent = message;
  elem.classList.add('show');
}

function showSuccess(elementId, message) {
  const elem = document.getElementById(elementId);
  elem.textContent = message;
  elem.classList.add('show');
}

function toggleRegistration(event) {
  event.preventDefault();
  const endpoint = getConfig().dbEndpoint;
  if (!endpoint) {
    alert('Database not configured yet. Please ask an administrator to set up the database endpoint.');
    return;
  }
  alert('Registration portal coming soon. Please contact an administrator for access.');
}
